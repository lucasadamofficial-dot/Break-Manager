const uid = (p="id") => p + "_" + Date.now().toString(36) + "_" + Math.floor(Math.random()*1e4);
const clone = (o) => JSON.parse(JSON.stringify(o));
const pad = (n) => String(n).padStart(2,"0");

function dateStr(d){ const x = new Date(d); return x.getFullYear()+"-"+pad(x.getMonth()+1)+"-"+pad(x.getDate()); }
const todayStr = () => dateStr(new Date());

function fmtClock(secs){
  secs = Math.max(0, Math.floor(secs));
  const h = Math.floor(secs/3600), m = Math.floor((secs%3600)/60), s = secs%60;
  return h>0 ? `${h}:${pad(m)}:${pad(s)}` : `${pad(m)}:${pad(s)}`;
}
function fmtMins(mins){
  mins = Math.round(mins||0);
  if (mins < 60) return mins + "m";
  const h = Math.floor(mins/60), m = mins%60;
  return m ? `${h}h ${m}m` : `${h}h`;
}
function fmtTime(iso){ if(!iso) return "—"; return new Date(iso).toLocaleTimeString([], {hour:"numeric", minute:"2-digit"}); }
function fmtDay(d){ return new Date(d).toLocaleDateString([], {month:"short", day:"numeric"}); }
function weekKey(d){
  const x = new Date(d); x.setHours(0,0,0,0);
  const day = (x.getDay()+6)%7; x.setDate(x.getDate()-day); // Monday start
  return dateStr(x);
}
function monthKey(d){ const x = new Date(d); return x.getFullYear()+"-"+pad(x.getMonth()+1); }

// minutes attributed to a record (live elapsed if ongoing)
function recMins(r, now){
  const start = new Date(r.startTime).getTime();
  const end = r.endTime ? new Date(r.endTime).getTime() : now;
  return Math.max(0, (end - start)/60000);
}
function isExceeded(r, now){
  if (!r.maxMinutes) return false;
  return recMins(r, now) > r.maxMinutes;
}

// light demo history so dashboards aren't empty in local mode
function seedRecords(employees, breakTypes){
  const recs = [];
  const emps = employees.filter(e => e.role !== "Admin");
  const now = Date.now();
  for (let d=6; d>=0; d--){
    const day = new Date(now - d*86400000);
    emps.forEach(e => {
      const count = 1 + Math.floor(Math.random()*3);
      for (let i=0;i<count;i++){
        const bt = breakTypes[Math.floor(Math.random()*breakTypes.length)];
        const startH = 9 + Math.floor(Math.random()*8);
        const startM = Math.floor(Math.random()*59);
        const start = new Date(day); start.setHours(startH, startM, 0, 0);
        const over = Math.random() < 0.22;
        const dur = Math.max(2, Math.round(bt.maxMinutes * (over ? (1.1 + Math.random()*0.6) : (0.4 + Math.random()*0.5))));
        const end = new Date(start.getTime() + dur*60000);
        recs.push({
          id: uid("rec"), employeeId:e.empId, employeeName:e.name, department:e.department, teamLead:e.teamLead,
          breakType: bt.name, breakTypeColor: bt.color, maxMinutes: bt.maxMinutes,
          startTime: start.toISOString(), endTime: end.toISOString(),
          durationMin: dur, note:"", date: dateStr(start), status:"Returned",
        });
      }
    });
  }
  // a couple ongoing breaks today for live view
  const live = [emps[0], emps[3]].filter(Boolean);
  live.forEach((e,idx) => {
    const bt = breakTypes[idx % breakTypes.length];
    const start = new Date(now - (idx===0? 6: 14)*60000);
    recs.push({
      id: uid("rec"), employeeId:e.empId, employeeName:e.name, department:e.department, teamLead:e.teamLead,
      breakType: bt.name, breakTypeColor: bt.color, maxMinutes: bt.maxMinutes,
      startTime: start.toISOString(), endTime:null, durationMin:null, note:"", date: todayStr(), status:"On Break",
    });
  });
  return recs;
}

/* ---------------- action engine (shared shape with backend) -- */
function applyAction(db, action, p){
  const d = clone(db);
  const now = new Date().toISOString();
  switch(action){
    case "startBreak": {
      const emp = d.employees.find(e => e.empId === p.employeeId);
      const bt = d.breakTypes.find(b => b.id === p.breakTypeId);
      if (!emp || !bt) break;
      // guard: close any stray open break first
      d.records.forEach(r => { if (r.employeeId===emp.empId && r.status==="On Break"){ r.status="Returned"; r.endTime=now; r.durationMin=Math.round(recMins(r, Date.now())); }});
      d.records.push({
        id: uid("rec"), employeeId: emp.empId, employeeName: emp.name, department: emp.department, teamLead: emp.teamLead,
        breakType: bt.name, breakTypeColor: bt.color, maxMinutes: bt.maxMinutes,
        startTime: now, endTime: null, durationMin: null, note: p.note||"", date: todayStr(), status:"On Break",
      });
      break;
    }
    case "endBreak": {
      const r = d.records.find(x => x.id === p.recordId);
      if (r && r.status === "On Break"){
        r.endTime = now;
        r.durationMin = Math.round(recMins(r, Date.now()));
        r.status = "Returned";
      }
      break;
    }
    case "addEmployee": {
      d.employees.push({ id: uid("emp"), status:"Active", ...p });
      break;
    }
    case "updateEmployee": {
      const i = d.employees.findIndex(e => e.id === p.id);
      if (i>=0) d.employees[i] = { ...d.employees[i], ...p };
      break;
    }
    case "deleteEmployee": {
      d.employees = d.employees.filter(e => e.id !== p.id);
      break;
    }
    case "addBreakType": {
      d.breakTypes.push({ id: uid("bt"), active:true, ...p });
      break;
    }
    case "updateBreakType": {
      const i = d.breakTypes.findIndex(b => b.id === p.id);
      if (i>=0) d.breakTypes[i] = { ...d.breakTypes[i], ...p };
      break;
    }
    case "deleteBreakType": {
      d.breakTypes = d.breakTypes.filter(b => b.id !== p.id);
      break;
    }
    case "updateSettings": {
      d.settings = { ...d.settings, ...p };
      break;
    }
    case "addAudit": {
      d.audit.unshift({ id: uid("log"), timestamp: now, employeeName: p.employeeName||"—", action: p.action, detail: p.detail||"" });
      d.audit = d.audit.slice(0, 500);
      break;
    }
    case "resetDemo": {
      return seedDb();
    }
    default: break;
  }
  return d;
}

/* ---------------- storage layer (pluggable) ------------------ */
// lazy-load a script only when its provider is selected
function loadScript(src){
  return new Promise((resolve, reject) => {
    if ([...document.scripts].some(s => s.src === src)) return resolve();
    const el = document.createElement("script");
    el.src = src; el.onload = () => resolve(); el.onerror = () => reject(new Error("load "+src));
    document.head.appendChild(el);
  });
}

let _supa = null, _fs = null;
async function supaClient(){
  if (_supa) return _supa;
  await loadScript("https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js");
  _supa = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  return _supa;
}
async function fsDb(){
  if (_fs) return _fs;
  await loadScript("https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js");
  await loadScript("https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js");
  if (!window.firebase.apps.length) window.firebase.initializeApp(FIREBASE_CONFIG);
  _fs = window.firebase.firestore();
  return _fs;
}
function jsonbinHeaders(write){
  const h = { "X-Master-Key": JSONBIN_KEY, "X-Bin-Meta": "false" };
  if (write) h["Content-Type"] = "application/json";
  return h;
}

// apps_script keeps its action-based backend (server applies + returns full db)
function parseAppsResponse(text){
  let data;
  try { data = JSON.parse(text); }
  catch(e){
    // Apps Script returns an HTML login/error page instead of JSON when the
    // Web app deployment isn't public or wasn't deployed correctly.
    const looksLikeLogin = /sign in|accounts\.google|requires? (authoriz|access)|<\!?html/i.test(text);
    throw new Error(looksLikeLogin
      ? "Apps Script deployment is not public — set Who-has-access to \"Anyone\" and redeploy."
      : "Apps Script did not return JSON.");
  }
  if (data && data.error) throw new Error("Apps Script error: " + data.error);
  return normalizeDb(data);
}
async function appsGet(){
  const url = APPS_SCRIPT_URL + (APPS_SCRIPT_URL.indexOf("?") > -1 ? "&" : "?") + "t=" + Date.now();
  const res = await fetch(url, { method:"GET", redirect:"follow" });
  return parseAppsResponse(await res.text());
}
async function appsPost(action, payload){
  const res = await fetch(APPS_SCRIPT_URL, {
    method:"POST",
    redirect:"follow",
    headers: { "Content-Type":"text/plain;charset=utf-8" }, // text/plain = no CORS preflight
    body: JSON.stringify({ action, payload }),
  });
  return parseAppsResponse(await res.text());
}

const Cloud = {
  // load whole db from the active store -> db object, or null if nothing stored yet
  async load(){
    if (MODE === "apps_script") return await appsGet();
    if (MODE === "supabase"){
      const c = await supaClient();
      const { data, error } = await c.from(SUPABASE_TABLE).select("data").eq("id", CLOUD_ID).maybeSingle();
      if (error) throw error;
      return data && data.data ? normalizeDb(data.data) : null;
    }
    if (MODE === "firebase"){
      const d = await fsDb();
      const snap = await d.collection("break_mgmt").doc(CLOUD_ID).get();
      return snap.exists ? normalizeDb(snap.data()) : null;
    }
    if (MODE === "jsonbin"){
      const res = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}/latest`, { headers: jsonbinHeaders(false) });
      if (!res.ok) throw new Error("jsonbin "+res.status);
      const j = await res.json();
      const rec = j.record || j;
      return rec && rec.employees ? normalizeDb(rec) : null;
    }
    return null;
  },
  // overwrite whole db (blob stores); apps_script writes via appsPost instead
  async save(db){
    const clean = normalizeDb(db);
    if (MODE === "supabase"){
      const c = await supaClient();
      const { error } = await c.from(SUPABASE_TABLE).upsert({ id: CLOUD_ID, data: clean });
      if (error) throw error;
    } else if (MODE === "firebase"){
      const d = await fsDb();
      await d.collection("break_mgmt").doc(CLOUD_ID).set(clean);
    } else if (MODE === "jsonbin"){
      const res = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}`, {
        method:"PUT", headers: jsonbinHeaders(true), body: JSON.stringify(clean)
      });
      if (!res.ok) throw new Error("jsonbin "+res.status);
    }
  },
};

/* ---------------- aggregations ------------------------------- */
function rangeRecords(records, when, ref){
  if (when==="today") return records.filter(r => r.date === todayStr());
  if (when==="week") return records.filter(r => weekKey(r.date) === weekKey(ref||new Date()));
  if (when==="month") return records.filter(r => monthKey(r.date) === monthKey(ref||new Date()));
  return records;
}
function summarize(records, now){
  const minutes = records.reduce((s,r)=> s + recMins(r, now), 0);
  const durs = records.map(r => recMins(r, now));
  return {
    count: records.length,
    minutes,
    avg: records.length ? minutes/records.length : 0,
    longest: durs.length ? Math.max(...durs) : 0,
    shortest: durs.length ? Math.min(...durs) : 0,
  };
}
function liveBreaks(records){ return records.filter(r => r.status === "On Break" && r.date === todayStr()); }

/* ---------------- export utilities --------------------------- */
function downloadBlob(content, filename, type){
  const blob = new Blob([content], { type });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename; a.click();
  setTimeout(()=>URL.revokeObjectURL(url), 1500);
}
function exportCSV(columns, rows, filename){
  const esc = v => `"${String(v==null?"":v).replace(/"/g,'""')}"`;
  const csv = [columns.map(esc).join(","), ...rows.map(r => r.map(esc).join(","))].join("\n");
  downloadBlob(csv, filename + ".csv", "text/csv;charset=utf-8;");
}
function exportExcel(sheetName, columns, rows, filename){
  if (typeof XLSX === "undefined") return exportCSV(columns, rows, filename);
  const ws = XLSX.utils.aoa_to_sheet([columns, ...rows]);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, sheetName.slice(0,31) || "Report");
  XLSX.writeFile(wb, filename + ".xlsx");
}
function exportPDF(title, subtitle, columns, rows, filename){
  if (!window.jspdf) return exportCSV(columns, rows, filename);
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation: columns.length > 6 ? "landscape" : "portrait" });
  const W = doc.internal.pageSize.getWidth();
  doc.setFillColor(15,23,42); doc.rect(0,0,W,26,"F");
  doc.setTextColor(255,255,255); doc.setFont("helvetica","bold"); doc.setFontSize(15);
  doc.text(title, 14, 13);
  doc.setFont("helvetica","normal"); doc.setFontSize(9); doc.setTextColor(180,190,210);
  doc.text(subtitle || "", 14, 20);
  doc.setTextColor(120,130,150); doc.setFontSize(8);
  doc.text("Generated " + new Date().toLocaleString(), W-14, 20, { align:"right" });
  doc.autoTable({
    head: [columns], body: rows, startY: 32,
    styles: { fontSize: 8, cellPadding: 2.5 },
    headStyles: { fillColor: [30,41,59], textColor: 255, fontStyle:"bold" },
    alternateRowStyles: { fillColor: [245,247,250] },
    margin: { left: 14, right: 14 },
  });
  doc.save(filename + ".pdf");
}

function Btn({ children, onClick, variant="primary", size="md", className="", type="button", disabled }){
  const base = "inline-flex items-center justify-center gap-2 font-medium rounded-lg transition focus:outline-none focus-visible:ring-2 focus-visible:ring-indigo-400 disabled:opacity-50 disabled:cursor-not-allowed";
  const sizes = { sm:"text-xs px-2.5 py-1.5", md:"text-sm px-3.5 py-2", lg:"text-base px-5 py-2.5" };
  const variants = {
    primary:"bg-indigo-600 hover:bg-indigo-500 text-white shadow-sm",
    ghost:"bg-transparent hover:bg-slate-200/70 dark:hover:bg-white/10 text-slate-700 dark:text-slate-200",
    outline:"border border-slate-300 dark:border-white/15 hover:bg-slate-100 dark:hover:bg-white/5 text-slate-700 dark:text-slate-200",
    danger:"bg-rose-600 hover:bg-rose-500 text-white",
    success:"bg-emerald-600 hover:bg-emerald-500 text-white",
    subtle:"bg-slate-100 dark:bg-white/10 hover:bg-slate-200 dark:hover:bg-white/15 text-slate-700 dark:text-slate-100",
  };
  return <button type={type} disabled={disabled} onClick={onClick} className={`${base} ${sizes[size]} ${variants[variant]} ${className}`}>{children}</button>;
}

/* Chart wrapper */
function ChartBox({ type, data, options, height=240, dark }){
  const ref = useRef(null);
  const inst = useRef(null);
  useEffect(() => {
    if (!window.Chart || !ref.current) return;
    const grid = dark ? "rgba(255,255,255,.07)" : "rgba(15,23,42,.07)";
    const tick = dark ? "rgba(226,232,240,.7)" : "rgba(71,85,105,.85)";
    const baseOpts = {
      responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{ labels:{ color: tick, font:{ family:"Inter", size:11 }, boxWidth:12, padding:12 } } },
      scales: type==="doughnut" || type==="pie" ? {} : {
        x:{ grid:{ color: grid }, ticks:{ color: tick, font:{ size:10 } } },
        y:{ grid:{ color: grid }, ticks:{ color: tick, font:{ size:10 } }, beginAtZero:true },
      },
    };
    inst.current = new Chart(ref.current, { type, data, options: { ...baseOpts, ...(options||{}) } });
    return () => { if (inst.current) inst.current.destroy(); };
  }, [JSON.stringify(data), type, dark]);
  return <div style={{ height }}><canvas ref={ref}></canvas></div>;
}

/* Live timer for an ongoing break */
function LiveTimer({ startTime, maxMinutes, big }){
  const [, force] = useState(0);
  useEffect(() => { const t = setInterval(()=>force(x=>x+1), 1000); return ()=>clearInterval(t); }, []);
  const secs = (Date.now() - new Date(startTime).getTime())/1000;
  const exceeded = maxMinutes && secs/60 > maxMinutes;
  const color = exceeded ? "#F43F5E" : "#F59E0B";
  return <span className={`font-mono font-semibold tnum ${big?"text-4xl sm:text-5xl":"text-sm"}`} style={{ color }}>{fmtClock(secs)}</span>;
}

const PALETTE = ["#6366F1","#10B981","#F59E0B","#22D3EE","#F43F5E","#A78BFA","#0EA5E9","#F472B6","#84CC16","#FB923C"];

function trendData(records, mode, now){
  const buckets = [];
  const n = mode==="day"?14:mode==="week"?8:6;
  for (let i=n-1;i>=0;i--){
    let key, label;
    if (mode==="day"){ const d=new Date(now-i*86400000); key=dateStr(d); label=fmtDay(d); }
    else if (mode==="week"){ const d=new Date(now-i*7*86400000); key=weekKey(d); label=fmtDay(new Date(key)); }
    else { const d=new Date(); d.setMonth(d.getMonth()-i); key=monthKey(d); label=d.toLocaleDateString([], {month:"short"}); }
    buckets.push({ key, label, mins:0 });
  }
  const idx = {}; buckets.forEach((b,i)=>idx[b.key]=i);
  records.forEach(r => {
    const k = mode==="day"? r.date : mode==="week"? weekKey(r.date) : monthKey(r.date);
    if (idx[k]!=null) buckets[idx[k]].mins += recMins(r, now);
  });
  return {
    labels: buckets.map(b=>b.label),
    datasets: [{ label:"Break minutes", data: buckets.map(b=>Math.round(b.mins)), backgroundColor:"#6366F1", borderColor:"#6366F1", borderRadius:6, maxBarThickness:34, tension:.35, fill:false }],
  };
}
function typeDistData(records, breakTypes, now){
  const m = {}; records.forEach(r => { m[r.breakType] = (m[r.breakType]||0) + 1; });
  const labels = Object.keys(m);
  const colors = labels.map(l => (breakTypes.find(b=>b.name===l)||{}).color || "#94A3B8");
  return { labels, datasets:[{ data: labels.map(l=>m[l]), backgroundColor: colors, borderWidth:0 }] };
}
function groupBarData(records, field, now, label){
  const m = {}; records.forEach(r => { const k = r[field] || "—"; m[k] = (m[k]||0) + recMins(r, now); });
  const labels = Object.keys(m);
  return { labels, datasets:[{ label, data: labels.map(k=>Math.round(m[k])), backgroundColor: labels.map((_,i)=>PALETTE[i%PALETTE.length]), borderRadius:6, maxBarThickness:38 }] };
}
function rankingData(records, now, top=10){
  const m = {}; records.forEach(r => { m[r.employeeName] = (m[r.employeeName]||0) + recMins(r, now); });
  const sorted = Object.entries(m).sort((a,b)=>b[1]-a[1]).slice(0, top);
  return {
    labels: sorted.map(s=>s[0]),
    datasets:[{ label:"Break minutes", data: sorted.map(s=>Math.round(s[1])), backgroundColor:"#6366F1", borderRadius:6 }],
  };
}

function LoginScreen({ db, onLogin, theme, toggleTheme }){
  const [empId, setEmpId] = useState("");
  const [pin, setPin] = useState("");
  const [err, setErr] = useState("");

  const submit = () => {
    const idIn = empId.trim().toLowerCase();
    const e = db.employees.find(x => String(x.empId).trim().toLowerCase() === idIn);
    if (!e){ setErr("Employee ID not found."); return; }
    if (e.status !== "Active"){ setErr("This account is deactivated."); return; }
    const stored = String(e.pin).trim(), entered = pin.trim();
    const numMatch = stored !== "" && entered !== "" && !isNaN(Number(stored)) && !isNaN(Number(entered)) && Number(stored) === Number(entered);
    if (stored !== entered && !numMatch){ setErr("Incorrect PIN."); return; }
    setErr(""); onLogin(e);
  };

  return (
    <div className="min-h-screen flex items-center justify-center p-4 bg-gradient-to-br from-slate-100 to-slate-200 dark:from-[#0B1220] dark:to-[#0a0f1c]">

        </div>
        <Card className="p-6">
          <div className="space-y-4">
            <Field label="Employee ID">
              <TextInput value={empId} onChange={e=>setEmpId(e.target.value)} placeholder="e.g. EMP-101" onKeyDown={e=>e.key==="Enter"&&submit()} autoFocus />
            </Field>
            <Field label="PIN">
              <TextInput type="password" value={pin} onChange={e=>setPin(e.target.value)} placeholder="••••" onKeyDown={e=>e.key==="Enter"&&submit()} />

function EmployeeView({ db, user, dispatch, theme }){
  const dark = theme === "dark";
  const [showStart, setShowStart] = useState(false);
  const now = Date.now();
  const myRecords = useMemo(()=> db.records.filter(r => r.employeeId === user.empId), [db.records, user.empId]);
  const active = myRecords.find(r => r.status === "On Break");

  const today = summarize(rangeRecords(myRecords,"today"), now);
  const week = summarize(rangeRecords(myRecords,"week"), now);
  const month = summarize(rangeRecords(myRecords,"month"), now);

  const start = (typeId, note) => {
    const bt = db.breakTypes.find(b=>b.id===typeId);
    dispatch("startBreak", { employeeId:user.empId, breakTypeId:typeId, note },
      { employeeName:user.name, action:"Break started", detail: bt? bt.name : "" });
    setShowStart(false);
  };
  const end = () => {
    dispatch("endBreak", { recordId: active.id },
      { employeeName:user.name, action:"Break ended", detail: active.breakType });
  };

  const histRows = [...myRecords].sort((a,b)=> new Date(b.startTime)-new Date(a.startTime)).slice(0,40).map(r => [
    fmtDay(r.date),
    <span className="inline-flex items-center gap-1.5"><span className="dot" style={{background:r.breakTypeColor}}></span>{r.breakType}</span>,
    fmtTime(r.startTime),
    r.endTime ? fmtTime(r.endTime) : <Badge color="amber">ongoing</Badge>,
    r.status==="On Break" ? <LiveTimer startTime={r.startTime} maxMinutes={r.maxMinutes} /> :
      <span className={isExceeded(r, now)?"text-rose-600 font-medium":""}>{fmtMins(r.durationMin)}</span>,
    isExceeded(r, now) ? <Badge color="red">over</Badge> : <Badge color="green">ok</Badge>,
  ]);

  return (
    <div className="space-y-6">
      {/* Action / live state */}
      <Card className="p-6">
        {active ? (
          <div className="flex flex-col sm:flex-row items-center gap-6">
            <div className={`flex items-center justify-center w-28 h-28 rounded-full border-4 ${isExceeded(active,now)?"border-rose-400 pulse-red":"border-amber-400 pulse-amber"}`}>
              <LiveTimer startTime={active.startTime} maxMinutes={active.maxMinutes} big />
            </div>
            <div className="flex-1 text-center sm:text-left">
              <div className="text-xs uppercase tracking-wide text-slate-400">Currently on</div>
              <div className="font-display text-2xl font-bold text-slate-900 dark:text-white flex items-center justify-center sm:justify-start gap-2">
                <span className="dot" style={{background:active.breakTypeColor, width:12, height:12}}></span>{active.breakType}
              </div>
              <div className="text-sm text-slate-500 mt-1">Started {fmtTime(active.startTime)} · limit {active.maxMinutes}m {isExceeded(active,now) && <span className="text-rose-600 font-medium">· limit exceeded</span>}</div>
              {active.note && <div className="text-sm text-slate-400 mt-1 italic">“{active.note}”</div>}
            </div>
            <Btn variant="danger" size="lg" onClick={end}>End break</Btn>
          </div>
        ) : (
          <div className="flex flex-col sm:flex-row items-center justify-between gap-4">
            <div>
              <div className="font-display text-xl font-semibold text-slate-900 dark:text-white">You're working <span className="dot ml-1" style={{background:"#10B981"}}></span></div>
              <div className="text-sm text-slate-500">Take a break when you need one — it's logged automatically.</div>
            </div>
            <Btn variant="success" size="lg" onClick={()=>setShowStart(true)}>▶ Start break</Btn>

/* ----- Employees Manager ----- */
function EmployeesManager({ db, dispatch }){
  const [editing, setEditing] = useState(null); // employee or {}
  const [q, setQ] = useState("");
  const [dept, setDept] = useState("");
  const leads = db.employees.filter(e => e.role === "TeamLead");
  const depts = [...new Set(db.employees.map(e=>e.department).filter(Boolean))];

  const filtered = db.employees.filter(e =>
    (!q || (e.name+e.empId+e.email).toLowerCase().includes(q.toLowerCase())) &&
    (!dept || e.department===dept)
  );

  const save = (data) => {
    if (data.id) dispatch("updateEmployee", data, { employeeName:"Admin", action:"Employee updated", detail:data.name });
    else dispatch("addEmployee", data, { employeeName:"Admin", action:"Employee added", detail:data.name });
    setEditing(null);
  };
  const del = (e) => { if (confirm(`Delete ${e.name}? Their break records remain in reports.`)){ dispatch("deleteEmployee", {id:e.id}, {employeeName:"Admin", action:"Employee deleted", detail:e.name}); } };
  const toggle = (e) => dispatch("updateEmployee", {id:e.id, status: e.status==="Active"?"Inactive":"Active"}, {employeeName:"Admin", action:"Employee "+(e.status==="Active"?"deactivated":"activated"), detail:e.name});

  const leadName = (id) => (leads.find(l=>l.empId===id)||{}).name || "—";
  const rows = filtered.map(e => [
    <span className="font-mono text-xs">{e.empId}</span>,
    <span className="font-medium text-slate-800 dark:text-slate-100">{e.name}</span>,
    e.department,
    e.designation,
    e.role==="Admin"?<Badge color="indigo">Admin</Badge>:e.role==="TeamLead"?<Badge color="indigo">Team Lead</Badge>:<Badge>Employee</Badge>,
    e.role==="Employee"?leadName(e.teamLead):"—",
    e.status==="Active"?<Badge color="green">Active</Badge>:<Badge color="slate">Inactive</Badge>,
    <div className="flex gap-1">
      <Btn size="sm" variant="ghost" onClick={()=>setEditing(e)}>Edit</Btn>

    </div>,
  ]);

  return (
    <Card className="p-4">
      <SectionTitle right={
        <div className="flex items-center gap-2">
          <ExportMenu title="Employees" columns={["Employee ID","Name","Department","Designation","Role","Team Lead","Email","Phone","Status"]}
            rows={db.employees.map(e=>[e.empId,e.name,e.department,e.designation,e.role,leadName(e.teamLead),e.email,e.phone,e.status])} filename="employees" />

        </div>

        <TextInput placeholder="Search name / ID / email" value={q} onChange={e=>setQ(e.target.value)} className="max-w-xs" />
        <Select value={dept} onChange={e=>setDept(e.target.value)} className="max-w-[180px]"><option value="">All departments</option>{depts.map(d=><option key={d}>{d}</option>)}</Select>

      <DataTable columns={["ID","Name","Dept","Designation","Role","Team Lead","Status",""]} rows={rows} />
      <EmployeeForm employee={editing} leads={leads} depts={depts} onSave={save} onClose={()=>setEditing(null)} />

        {tab==="daily" && <TextInput type="date" value={date} onChange={e=>setDate(e.target.value)} className="max-w-[170px]" />}
      </div>
      {/* tabs */}
      <div className="flex gap-1 mb-4 border-b border-slate-200 dark:border-white/10 overflow-x-auto">
        {[["daily","Daily"],["weekly","Weekly"],["monthly","Monthly"],["department","Department"],["employee","Per-employee"]].map(([k,l])=>(
          <button key={k} onClick={()=>setTab(k)} className={`px-3 py-2 text-sm font-medium whitespace-nowrap border-b-2 -mb-px ${tab===k?"border-indigo-500 text-indigo-600 dark:text-indigo-300":"border-transparent text-slate-500 hover:text-slate-700 dark:hover:text-slate-300"}`}>{l}</button>
        ))}
      </div>

      {tab==="daily" && <DailyReport records={filtered.filter(r=>r.date===date)} date={date} title={title} now={now} />}
      {tab==="weekly" && <PeriodReport records={filtered} mode="week" title={title} now={now} />}
      {tab==="monthly" && <PeriodReport records={filtered} mode="month" title={title} now={now} />}
      {tab==="department" && <DepartmentReport records={filtered} db={db} title={title} now={now} />}
      {tab==="employee" && <PerEmployeeReport records={filtered} employees={empOptions} db={db} title={title} now={now} />}
    </Card>
  );
}

function DailyReport({ records, date, title, now }){
  // group by employee
  const byEmp = {};
  records.forEach(r => { (byEmp[r.employeeName] = byEmp[r.employeeName] || []).push(r); });
  const rows = Object.entries(byEmp).map(([name, recs]) => {
    const s = summarize(recs, now);
    const types = [...new Set(recs.map(r=>r.breakType))].join(", ");
    return [name, recs.length, fmtMins(s.minutes), types, fmtMins(s.longest)];
  });
  const exportRows = Object.entries(byEmp).map(([name, recs]) => {
    const s = summarize(recs, now); return [name, recs.length, Math.round(s.minutes), [...new Set(recs.map(r=>r.breakType))].join(" | "), Math.round(s.longest)];
  });
  return (
    <div>
      <div className="flex justify-between items-center mb-2">
        <div className="text-sm text-slate-500">{fmtDay(date)} · {records.length} breaks</div>
        <ExportMenu title={title+" — Daily"} subtitle={fmtDay(date)} columns={["Employee","Total Breaks","Total Minutes","Break Types","Longest (min)"]} rows={exportRows} filename={"daily-report-"+date} />
      </div>
      <DataTable columns={["Employee","Total Breaks","Total Minutes","Break Types Used","Longest"]} rows={rows} empty="No breaks on this day." />
    </div>
  );
}

function PeriodReport({ records, mode, title, now }){
  // group by employee with per-period breakdown
  const byEmp = {};
  records.forEach(r => { (byEmp[r.employeeName] = byEmp[r.employeeName] || []).push(r); });
  const rows = Object.entries(byEmp).map(([name, recs]) => {
    const s = summarize(recs, now);
    const days = new Set(recs.map(r=>r.date)).size || 1;
    return [name, recs.length, fmtMins(s.minutes), fmtMins(s.avg), fmtMins(s.minutes / (mode==="week"?7:days))];
  }).sort((a,b)=>0);
  const exportRows = Object.entries(byEmp).map(([name, recs]) => {
    const s = summarize(recs, now); const days = new Set(recs.map(r=>r.date)).size || 1;
    return [name, recs.length, Math.round(s.minutes), Math.round(s.avg), Math.round(s.minutes/(mode==="week"?7:days))];
  });
  return (
    <div>
      <div className="flex justify-between items-center mb-2">
        <div className="text-sm text-slate-500">{mode==="week"?"Current week":"Current month"} · {records.length} breaks</div>
        <ExportMenu title={title+" — "+(mode==="week"?"Weekly":"Monthly")} columns={["Employee","Break Count","Total Minutes","Avg / Break","Avg / Day"]} rows={exportRows} filename={mode+"-report-"+todayStr()} />
      </div>
      <DataTable columns={["Employee","Break Count","Total Minutes","Avg / Break","Avg / Day"]} rows={rows} empty="No breaks in this period." />
    </div>
  );
}

function DepartmentReport({ records, db, title, now }){
  const byDept = {};
  records.forEach(r => { (byDept[r.department||"—"] = byDept[r.department||"—"] || []).push(r); });
  const rows = Object.entries(byDept).map(([d, recs]) => {
    const s = summarize(recs, now);
    const tc = {}; recs.forEach(r=>tc[r.breakType]=(tc[r.breakType]||0)+1);
    const most = Object.entries(tc).sort((a,b)=>b[1]-a[1])[0];
    return [d, recs.length, fmtMins(s.minutes), fmtMins(s.avg), most?most[0]:"—"];
  });
  const exportRows = Object.entries(byDept).map(([d, recs]) => {
    const s = summarize(recs, now); const tc={}; recs.forEach(r=>tc[r.breakType]=(tc[r.breakType]||0)+1);
    const most=Object.entries(tc).sort((a,b)=>b[1]-a[1])[0];
    return [d, recs.length, Math.round(s.minutes), Math.round(s.avg), most?most[0]:"—"];
  });
  return (
    <div>
      <div className="flex justify-end mb-2"><ExportMenu title={title+" — Department"} columns={["Department","Total Breaks","Total Minutes","Avg / Break","Most Used Type"]} rows={exportRows} filename={"department-report-"+todayStr()} /></div>
      <DataTable columns={["Department","Total Breaks","Total Minutes","Avg / Break","Most Used Type"]} rows={rows} empty="No data." />
    </div>
  );
}

function PerEmployeeReport({ records, employees, db, title, now }){
  const leadName = (id) => (db.employees.find(l=>l.empId===id)||{}).name || "—";
  const data = employees.map(e => {
    const recs = records.filter(r => r.employeeId === e.empId);
    const s = summarize(recs, now);
    const count = (name) => recs.filter(r=>r.breakType===name).length;
    const other = recs.filter(r=>!["Tea Break","Lunch Break","Prayer (Namaz)","Phone Call"].includes(r.breakType)).length;
    return { e, recs, s,
      tea:count("Tea Break"), lunch:count("Lunch Break"), namaz:count("Prayer (Namaz)"), phone:count("Phone Call"), other,
    };
  }).filter(d => d.recs.length > 0);

  const rows = data.map(d => [
    <span className="font-medium text-slate-800 dark:text-slate-100">{d.e.name}</span>,
    d.e.department, leadName(d.e.teamLead),
    d.recs.length, fmtMins(d.s.minutes),
    d.tea, d.lunch, d.namaz, d.phone, d.other,
    fmtMins(d.s.avg), fmtMins(d.s.longest), fmtMins(d.s.shortest),
  ]);
  const exportRows = data.map(d => [
    d.e.name, d.e.department, leadName(d.e.teamLead), d.recs.length, Math.round(d.s.minutes),
    d.tea, d.lunch, d.namaz, d.phone, d.other, Math.round(d.s.avg), Math.round(d.s.longest), Math.round(d.s.shortest),
  ]);
  const cols = ["Employee","Dept","Team Lead","Breaks","Total Min","Tea","Lunch","Namaz","Phone","Other","Avg","Longest","Shortest"];
  return (
    <div>
      <div className="flex justify-end mb-2"><ExportMenu title={title+" — Per Employee"} columns={cols} rows={exportRows} filename={"employee-report-"+todayStr()} /></div>
      <DataTable columns={cols} rows={rows} empty="No data." />
    </div>
  );
}

/* ============================================================
   NOTIFICATIONS (bell)
   ============================================================ */
function NotificationsBell({ db, scopeRecords }){
  const [open, setOpen] = useState(false);
  const ref = useRef(null);
  const now = Date.now();
  useEffect(() => { const h=e=>{ if(ref.current&&!ref.current.contains(e.target)) setOpen(false); }; document.addEventListener("mousedown",h); return ()=>document.removeEventListener("mousedown",h); }, []);
  const recs = scopeRecords || db.records;
  const live = liveBreaks(recs);
  const exceeding = live.filter(r=>isExceeded(r,now));
  // recent events: last 8 starts/ends today
  const events = recs.filter(r=>r.date===todayStr())
    .flatMap(r => [{ t:new Date(r.startTime).getTime(), txt:`${r.employeeName} started ${r.breakType}`, kind:"start" }]
      .concat(r.endTime ? [{ t:new Date(r.endTime).getTime(), txt:`${r.employeeName} returned from ${r.breakType}`, kind:"end" }] : []))
    .sort((a,b)=>b.t-a.t).slice(0,8);
  const badge = exceeding.length;
  return (
    <div className="relative" ref={ref}>
      <button onClick={()=>setOpen(o=>!o)} className="relative w-9 h-9 rounded-lg hover:bg-white/10 flex items-center justify-center text-slate-300">
        🔔{badge>0 && <span className="absolute -top-0.5 -right-0.5 min-w-[16px] h-4 px-1 rounded-full bg-rose-500 text-white text-[10px] font-bold flex items-center justify-center">{badge}</span>}
      </button>
      {open && (
        <div className="absolute right-0 mt-2 w-72 z-30 bg-white dark:bg-[#111A2E] border border-slate-200 dark:border-white/10 rounded-xl shadow-xl overflow-hidden">
          <div className="px-3 py-2 border-b border-slate-200 dark:border-white/10 text-sm font-semibold text-slate-700 dark:text-slate-200">Notifications</div>
          <div className="max-h-80 overflow-y-auto text-sm">
            {exceeding.map(r => (
              <div key={r.id} className="px-3 py-2 bg-rose-50 dark:bg-rose-500/10 border-b border-slate-100 dark:border-white/5">
                <div className="text-rose-700 dark:text-rose-300 font-medium">🚩 Over limit</div>
                <div className="text-slate-600 dark:text-slate-300 text-xs">{r.employeeName} · {r.breakType} · <LiveTimer startTime={r.startTime} maxMinutes={r.maxMinutes} /></div>
              </div>
            ))}
            {events.length===0 && exceeding.length===0 && <div className="px-3 py-6 text-center text-slate-400 text-xs">No activity today.</div>}
            {events.map((e,i)=>(
              <div key={i} className="px-3 py-2 border-b border-slate-100 dark:border-white/5 flex items-start gap-2">
                <span className="dot mt-1.5" style={{background:e.kind==="start"?"#F59E0B":"#10B981"}}></span>
                <div><div className="text-slate-700 dark:text-slate-200 text-xs">{e.txt}</div><div className="text-[10px] text-slate-400">{new Date(e.t).toLocaleTimeString([], {hour:"numeric",minute:"2-digit"})}</div></div>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

/* ============================================================
   APP SHELL + ROOT
   ============================================================ */
const NAV = {
  Admin: [["dashboard","Dashboard"],["live","Live"],["employees","Employees"],["breaktypes","Break Types"],["reports","Reports"],["audit","Audit Log"]],
  TeamLead: [["dashboard","Dashboard"],["reports","Reports"]],
  Employee: [],
};

function App(){
  const [db, setDb] = useState(null);
  const [user, setUser] = useState(null);
  const [theme, setTheme] = useState(() => safeStore.get("break_theme") || "light");
  const [section, setSection] = useState("dashboard");
  const [, tick] = useState(0);
  const [syncErr, setSyncErr] = useState(false);
  const [syncMsg, setSyncMsg] = useState("");
  const [sheetEmpty, setSheetEmpty] = useState(false);
  const failSync = (e) => { setSyncErr(true); setSyncMsg(e && e.message ? e.message : ""); };
  const okSync = () => { setSyncErr(false); setSyncMsg(""); };
  const [loading, setLoading] = useState(true);
  const dbRef = useRef(null);     // always-current db for deterministic writes
  const busyRef = useRef(false);  // pause poll while a write is in flight
  const setDbBoth = (d) => { dbRef.current = d; setDb(d); };

  // theme
  useEffect(() => {
    document.documentElement.classList.toggle("dark", theme==="dark");
    safeStore.set("break_theme", theme);
  }, [theme]);

  // initial load
  const loadDb = useCallback(async () => {
    if (isCloud()){
      try {
        let data = await Cloud.load();
        const notSeeded = !data || !Array.isArray(data.employees) || data.employees.length === 0;
        if (notSeeded){                   // empty store / sheet → seed so login works
          const seeded = seedDb();
          if (MODE !== "apps_script") { await Cloud.save(seeded); }
          else { setSheetEmpty(true); }   // Sheets: prompt user to run setup() to persist
          data = seeded;
        } else { setSheetEmpty(false); }
        setDbBoth(data); okSync(); setLoading(false); return;
      } catch(e){ failSync(e); }     // fall back to local copy on failure
    }
    const raw = safeStore.get(STORE_KEY);
    if (raw){ try { setDbBoth(JSON.parse(raw)); setLoading(false); return; } catch(e){} }
    const seeded = seedDb();
    setDbBoth(seeded); safeStore.set(STORE_KEY, JSON.stringify(seeded)); setLoading(false);
  }, []);

  useEffect(() => { loadDb(); }, [loadDb]);

  // 1s tick for live durations across the app
  useEffect(() => { const t = setInterval(()=>tick(x=>x+1), 1000); return ()=>clearInterval(t); }, []);

  // background poll (cloud modes) every REFRESH_MS
  useEffect(() => {
    if (!isCloud()) return;
    const t = setInterval(async () => {
      if (busyRef.current) return;       // don't clobber an in-flight local write
      try { const data = await Cloud.load(); if (data){ setDbBoth(data); okSync(); } }
      catch(e){ failSync(e); }
    }, REFRESH_MS);
    return () => clearInterval(t);
  }, []);

  const dispatch = useCallback(async (action, payload, audit) => {
    const base = dbRef.current;
    if (!base) return;
    let next = applyAction(base, action, payload);
    if (audit && MODE !== "apps_script") next = applyAction(next, "addAudit", audit);
    setDbBoth(next);                       // optimistic local update
    if (!isCloud()){ safeStore.set(STORE_KEY, JSON.stringify(next)); return; }
    busyRef.current = true;
    try {
      if (MODE === "apps_script"){
        await appsPost(action, payload);
        if (audit) await appsPost("addAudit", audit);
        const data = await appsGet(); setDbBoth(data);
      } else {
        await Cloud.save(next);            // blob stores: push whole db
      }
      okSync();
    } catch(e){ failSync(e); }
    finally { busyRef.current = false; }
  }, []);

  const logout = () => { setUser(null); setSection("dashboard"); };
  const toggleTheme = () => setTheme(t => t==="dark"?"light":"dark");

  if (loading || !db) return <div className="min-h-screen flex items-center justify-center text-slate-400">Loading…</div>;
  if (!user) return <LoginScreen db={db} onLogin={(u)=>{ setUser(u); setSection("dashboard"); }} theme={theme} toggleTheme={toggleTheme} />;

  const nav = NAV[user.role] || [];
  // keep section valid
  const validSections = nav.map(n=>n[0]);
  const curSection = user.role==="Employee" ? "me" : (validSections.includes(section) ? section : (validSections[0]||"dashboard"));

  // team records for lead notifications
  let scopeRecords = db.records;
  if (user.role==="TeamLead"){
    const teamIds = new Set(db.employees.filter(e=>e.role==="Employee"&&e.teamLead===user.empId).map(e=>e.empId));
    scopeRecords = db.records.filter(r=>teamIds.has(r.employeeId));
  } else if (user.role==="Employee"){
    scopeRecords = db.records.filter(r=>r.employeeId===user.empId);
  }

  const roleLabel = { Admin:"Administrator", TeamLead:"Team Lead", Employee:"Employee" }[user.role];

  return (
    <div className="min-h-screen flex flex-col">
      {/* top bar */}
      <header className="sticky top-0 z-40 bg-[#0B1220] text-white border-b border-white/10 no-print">
        <div className="max-w-7xl mx-auto px-4 h-14 flex items-center justify-between gap-3">
          <div className="flex items-center gap-2.5">
            <div className="w-8 h-8 rounded-lg bg-indigo-600 flex items-center justify-center font-display font-bold">⏱</div>
            <div className="font-display font-semibold tracking-tight">Break Manager</div>
            {MODE==="local" && <span className="hidden sm:inline text-[10px] px-2 py-0.5 rounded-full bg-amber-500/20 text-amber-300 border border-amber-400/30">session mode</span>}
            {isCloud() && !syncErr && <span className="hidden sm:inline text-[10px] px-2 py-0.5 rounded-full bg-emerald-500/20 text-emerald-300 border border-emerald-400/30">{MODE_LABEL} · live</span>}
            {syncErr && <span className="hidden sm:inline text-[10px] px-2 py-0.5 rounded-full bg-rose-500/20 text-rose-300 border border-rose-400/30">sync error</span>}
          </div>
          <div className="flex items-center gap-1.5">
            <NotificationsBell db={db} scopeRecords={scopeRecords} />
            <button onClick={toggleTheme} className="w-9 h-9 rounded-lg hover:bg-white/10 flex items-center justify-center text-slate-300">{theme==="dark"?"☀":"🌙"}</button>
            <div className="hidden sm:flex items-center gap-2 pl-2 ml-1 border-l border-white/10">
              <div className="text-right leading-tight">
                <div className="text-sm font-medium">{user.name}</div>
                <div className="text-[11px] text-slate-400">{roleLabel} · {user.empId}</div>
              </div>
              <div className="w-8 h-8 rounded-full bg-indigo-500/30 border border-indigo-400/40 flex items-center justify-center text-sm font-semibold">{user.name[0]}</div>
            </div>
            <Btn variant="ghost" size="sm" className="text-slate-300 hover:text-white" onClick={logout}>Sign out</Btn>
          </div>
        </div>
        {/* section tabs */}
        {nav.length>0 && (
          <div className="max-w-7xl mx-auto px-2 flex gap-0.5 overflow-x-auto">
            {nav.map(([k,l])=>(
              <button key={k} onClick={()=>setSection(k)} className={`px-3.5 py-2.5 text-sm font-medium whitespace-nowrap border-b-2 transition ${curSection===k?"border-indigo-400 text-white":"border-transparent text-slate-400 hover:text-slate-200"}`}>{l}</button>
            ))}
          </div>
        )}
      </header>

      <main className="flex-1 max-w-7xl w-full mx-auto px-4 py-6">
        {syncErr && <div className="mb-4 text-sm bg-rose-50 dark:bg-rose-500/10 text-rose-700 dark:text-rose-300 rounded-lg px-3 py-2">Couldn't reach the {MODE_LABEL} store — showing the last data fetched.{syncMsg ? " " + syncMsg : " Check your credentials / deployment in the config block."}</div>}
        {sheetEmpty && !syncErr && <div className="mb-4 text-sm bg-amber-50 dark:bg-amber-500/10 text-amber-800 dark:text-amber-300 rounded-lg px-3 py-2">Connected to Google Sheets, but the sheet is empty. Run <span className="font-mono font-semibold">setup</span> once in Apps Script (Run ▸ setup) to create the tabs and seed data. You're viewing seed data locally until then.</div>}
        {user.role==="Employee" && <EmployeeView db={db} user={user} dispatch={dispatch} theme={theme} />}
        {user.role==="Admin" && <AdminView db={db} dispatch={dispatch} theme={theme} section={curSection} setSection={setSection} />}
        {user.role==="TeamLead" && <TeamLeadView db={db} user={user} theme={theme} section={curSection} />}
      </main>

      <footer className="no-print text-center text-[11px] text-slate-400 py-4">
        Break Management & Reporting · {db.employees.length} employees · auto-refresh {Math.round(REFRESH_MS/1000)}s
        {user.role==="Admin" && <button onClick={()=>{ if(confirm("Reset to demo data? This clears local records.")){ dispatch("resetDemo",{}); } }} className="ml-2 underline hover:text-slate-600">reset demo</button>}
      </footer>
    </div>
  );
}

/* normalize backend payload to expected shape */
function normalizeDb(data){
  return {
    employees: data.employees || [],
    breakTypes: data.breakTypes || [],
    records: data.records || [],
    audit: data.audit || [],
    settings: data.settings || { refreshMs: REFRESH_MS },
  };
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
